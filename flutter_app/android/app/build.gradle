plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.apple.disease.detector"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    defaultConfig {
        applicationId "com.apple.disease.detector"
        minSdk 24          // requis par tflite_flutter
        targetSdk flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
        }
    }

    // Nécessaire pour tflite_flutter sur certains appareils ARM
    aaptOptions {
        noCompress "tflite"
    }
}

flutter {
    source "../.."
}
