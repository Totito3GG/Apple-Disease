name: Build Apple Disease APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Flutter project
        run: |
          flutter create --org com.apple.disease --project-name apple_disease_detector --platforms android app_build

      - name: Copy source files and assets
        run: |
          cp -r flutter_app/lib/. app_build/lib/
          mkdir -p app_build/assets/model
          cp flutter_app/assets/model/apple_disease_f16.tflite app_build/assets/model/
          cp flutter_app/assets/model/class_names.json app_build/assets/model/
          cp flutter_app/pubspec.yaml app_build/pubspec.yaml

      - name: Patch Android config
        working-directory: app_build/android
        run: |
          # Fix JVM compatibility for tflite_flutter 0.12.x
          echo "kotlin.jvm.target.validation.mode=WARNING" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx4G" >> gradle.properties

          # Patch app/build.gradle.kts or build.gradle
          if [ -f "app/build.gradle.kts" ]; then
            FILE="app/build.gradle.kts"
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' $FILE
            sed -i 's/sourceCompatibility = JavaVersion.VERSION_1_8/sourceCompatibility = JavaVersion.VERSION_17/' $FILE
            sed -i 's/targetCompatibility = JavaVersion.VERSION_1_8/targetCompatibility = JavaVersion.VERSION_17/' $FILE
            sed -i 's/jvmTarget = "1.8"/jvmTarget = "17"/' $FILE
            sed -i '/buildTypes {/i\    aaptOptions { noCompress("tflite") }' $FILE
          else
            FILE="app/build.gradle"
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' $FILE
            sed -i 's/minSdk flutter.minSdkVersion/minSdk 24/' $FILE
            sed -i 's/sourceCompatibility JavaVersion.VERSION_1_8/sourceCompatibility JavaVersion.VERSION_17/' $FILE
            sed -i 's/targetCompatibility JavaVersion.VERSION_1_8/targetCompatibility JavaVersion.VERSION_17/' $FILE
            sed -i "s/jvmTarget = '1.8'/jvmTarget = '17'/" $FILE
            sed -i '/buildTypes {/i\    aaptOptions { noCompress "tflite" }' $FILE
          fi
          echo "=== Patched $FILE ===" && cat $FILE

      - name: Get dependencies
        working-directory: app_build
        run: flutter pub get

      - name: Patch tflite_flutter plugin JVM target
        run: |
          # Fix tflite_flutter plugin itself in pub cache
          find ~/.pub-cache -path "*/tflite_flutter*/android/build.gradle" 2>/dev/null | while read f; do
            echo "Patching: $f"
            sed -i 's/sourceCompatibility JavaVersion.VERSION_11/sourceCompatibility JavaVersion.VERSION_17/' "$f" || true
            sed -i 's/targetCompatibility JavaVersion.VERSION_11/targetCompatibility JavaVersion.VERSION_17/' "$f" || true
            sed -i 's/sourceCompatibility JavaVersion.VERSION_1_8/sourceCompatibility JavaVersion.VERSION_17/' "$f" || true
            sed -i 's/targetCompatibility JavaVersion.VERSION_1_8/targetCompatibility JavaVersion.VERSION_17/' "$f" || true
            sed -i "s/jvmTarget = '1.8'/jvmTarget = '17'/" "$f" || true
            sed -i 's/jvmTarget = "1.8"/jvmTarget = "17"/' "$f" || true
          done

      - name: Build APK
        working-directory: app_build
        run: |
          flutter build apk --release --no-tree-shake-icons || true
          echo "=== Searching for APK ==="
          find . -name "*.apk" -type f 2>/dev/null

      - name: Locate and upload APK
        run: |
          APK=$(find app_build -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "APK found: $APK"
            cp "$APK" app-release.apk
            ls -lh app-release.apk
          else
            echo "No APK found - build failed"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apple-disease-detector-apk
          path: app-release.apk
          retention-days: 30
