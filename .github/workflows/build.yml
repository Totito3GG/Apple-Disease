name: Build Apple Disease APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Flutter project
        run: flutter create --org com.apple.disease --project-name apple_disease_detector --platforms android app_build

      - name: Copy our source files
        run: |
          cp -r flutter_app/lib/. app_build/lib/
          mkdir -p app_build/assets/model
          cp flutter_app/assets/model/apple_disease_f16.tflite app_build/assets/model/
          cp flutter_app/assets/model/class_names.json app_build/assets/model/
          cp flutter_app/pubspec.yaml app_build/pubspec.yaml

      - name: Patch build.gradle (minSdk + Java17 + noCompress tflite)
        working-directory: app_build/android/app
        run: |
          if [ -f "build.gradle.kts" ]; then
            FILE="build.gradle.kts"
            # minSdk
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' $FILE
            sed -i 's/minSdkVersion = flutter.minSdkVersion/minSdkVersion = 24/' $FILE
            # Java 17 (fix JVM incompatibility with tflite_flutter 0.12.x)
            sed -i 's/sourceCompatibility = JavaVersion.VERSION_1_8/sourceCompatibility = JavaVersion.VERSION_17/' $FILE
            sed -i 's/targetCompatibility = JavaVersion.VERSION_1_8/targetCompatibility = JavaVersion.VERSION_17/' $FILE
            sed -i 's/jvmTarget = "1.8"/jvmTarget = "17"/' $FILE
            # aaptOptions
            sed -i '/buildTypes {/i\    aaptOptions { noCompress("tflite") }\n' $FILE
          else
            FILE="build.gradle"
            # minSdk
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' $FILE
            sed -i 's/minSdk flutter.minSdkVersion/minSdk 24/' $FILE
            # Java 17
            sed -i 's/sourceCompatibility JavaVersion.VERSION_1_8/sourceCompatibility JavaVersion.VERSION_17/' $FILE
            sed -i 's/targetCompatibility JavaVersion.VERSION_1_8/targetCompatibility JavaVersion.VERSION_17/' $FILE
            sed -i "s/jvmTarget = '1.8'/jvmTarget = '17'/" $FILE
            # aaptOptions
            sed -i '/buildTypes {/i\    aaptOptions { noCompress "tflite" }\n' $FILE
          fi
          echo "=== $FILE ===" && cat $FILE

      - name: Build APK
        working-directory: app_build
        run: |
          flutter pub get
          flutter build apk --release
          echo "=== APK trouvé ==="
          find build -name "*.apk" -type f

      - name: Copy APK to workspace root
        run: |
          find app_build/build -name "*.apk" -type f -exec cp {} app-release.apk \;
          ls -lh app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apple-disease-detector-apk
          path: app-release.apk
          retention-days: 30
